[package]
name = "secure-types-fuzz"
version = "0.1.0"
edition = "2021"
publish = false

[package.metadata]
cargo-fuzz = true

[dependencies]
secure-types = { path = "../", features = ["zeroize", "serde"] }
arbitrary = { version = "1.3", features = ["derive"] }
libfuzzer-sys = "0.4"

[[bin]]
name = "expose"                 # FIXED: Matches `cargo fuzz run expose`
path = "fuzz_targets/expose.rs"
test = false
bench = false
doc = false

[[bin]]
name = "clone"                 # FIXED: Matches `cargo fuzz run clone`
path = "fuzz_targets/clone.rs"
test = false
bench = false
doc = false
