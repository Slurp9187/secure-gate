[package]
name = "secure-gate-fuzz"
version = "0.1.1"
edition = "2021"
publish = false

[package.metadata]
cargo-fuzz = true

[dependencies]
secure-gate = { path = "../", features = ["zeroize", "serde"] }
arbitrary = { version = "1.3", features = ["derive"] }
libfuzzer-sys = "0.4"
serde_json = "1.0"
bincode = "2.0"
zeroize = { version = "1.8", default-features = false, features = [
  "alloc",
  "zeroize_derive",
] }

[features]
zeroize = ["secure-gate/zeroize"]
serde = ["secure-gate/serde"]     # ← THIS LINE WAS MISSING

[[bin]]
name = "clone"
path = "fuzz_targets/clone.rs"
test = false
bench = false
doc = false

[[bin]]
name = "expose"
path = "fuzz_targets/expose.rs"
test = false
bench = false
doc = false

[[bin]]
name = "mut"
path = "fuzz_targets/mut.rs"
test = false
bench = false
doc = false

[[bin]]
name = "parsing"
path = "fuzz_targets/parsing.rs"
test = false
bench = false
doc = false

[[bin]]
name = "serde"
path = "fuzz_targets/serde.rs"
test = false
bench = false
doc = false
