name: CI main/0.9

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "secure-gate-core/**"
      - "secure-gate-compat/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "secure-gate-core/**"
      - "secure-gate-compat/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

jobs:
  fmt:
    name: rustfmt – check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable + rustfmt
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt

      - name: cargo fmt --all --check
        run: cargo fmt --all --check

  lint:
    name: Lint (${{ matrix.package }}/${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: no features
            package: secure-gate
            features: "--no-default-features"
          - name: rand (no_std)
            package: secure-gate
            features: "--no-default-features --features=rand"
          - name: full
            package: secure-gate
            features: "--features=full"
          - name: no features
            package: secure-gate-compat
            features: "--no-default-features"
          - name: secrecy-compat
            package: secure-gate-compat
            features: "--features=secrecy-compat"
          - name: all features
            package: secure-gate-compat
            features: "--all-features"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Clippy (${{ matrix.name }})
        run: cargo clippy -p ${{ matrix.package }} --tests --benches ${{ matrix.features }}

      - name: Doctests (${{ matrix.name }})
        run: cargo test -p ${{ matrix.package }} --doc ${{ matrix.features }}

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Baseline ──────────────────────────────────────────────────────────
          - name: Default features
            features: ""

          - name: No features
            features: "--no-default-features"

          # ── Alloc / std ──────────────────────────────────────────────────
          - name: alloc explicit
            features: "--no-default-features --features=alloc"

          - name: std explicit
            features: "--no-default-features --features=std"

          # ── Rand ──────────────────────────────────────────────────────────────
          # rand no longer forces alloc: Fixed::from_random() works without heap.
          # Dynamic::from_random() is covered by the alloc + rand entry below.
          - name: rand (no_std, Fixed only)
            features: "--no-default-features --features=rand"

          - name: alloc + rand
            features: "--no-default-features --features=alloc,rand"

          # ── Constant-time equality ────────────────────────────────────────────
          # alloc is required so Dynamic-backed tests in ct_eq_tests and
          # proptest_suite/ct_eq.rs (gated on ct-eq + alloc) are exercised.
          - name: ct-eq + alloc
            features: "--no-default-features --features=ct-eq,alloc"

          # ── Encoding ──────────────────────────────────────────────────────────
          # Encoding traits return String and require alloc; integration tests
          # import the traits, so alloc is needed to compile the test binaries.
          - name: encoding (all formats)
            features: "--no-default-features --features=alloc,encoding"

          - name: encoding-hex only
            features: "--no-default-features --features=alloc,encoding-hex"

          - name: encoding-base64 only
            features: "--no-default-features --features=alloc,encoding-base64"

          - name: encoding-bech32 only
            features: "--no-default-features --features=alloc,encoding-bech32"

          - name: encoding-bech32m only
            features: "--no-default-features --features=alloc,encoding-bech32m"

          - name: encoding-bech32 + bech32m
            features: "--no-default-features --features=alloc,encoding-bech32,encoding-bech32m"

          # ── Serde ─────────────────────────────────────────────────────────────
          - name: serde (serialize + deserialize)
            features: "--no-default-features --features=serde"

          - name: serde-serialize only
            features: "--no-default-features --features=serde-serialize"

          - name: serde-deserialize only
            features: "--no-default-features --features=serde-deserialize"

          # ── Cloneable ─────────────────────────────────────────────────────────
          - name: alloc + cloneable
            features: "--no-default-features --features=alloc,cloneable"

          # ── Full ──────────────────────────────────────────────────────────────
          - name: full
            features: "--features=full"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run tests (${{ matrix.name }})
        # The three trybuild snapshots are intentionally blessed on Rust 1.85.
        # Stable rustc diagnostics drift over time (dynamic_string_no_hex broke
        # when stable switched E0599's candidate note to a single-line form), so
        # skip those cases here and keep them covered by local/toolchain-pinned
        # 1.85 runs.
        run: cargo test -p secure-gate --tests ${{ matrix.features }} -- --skip fixed_alias_zero_size_compile_fail --skip serializable_secret_misuse --skip dynamic_string_no_hex_compile_fail

  # ---------------------------------------------------------------------------
  # Release-profile test job — build-invariance oracle
  #
  # The error API guarantees identical shapes and messages in debug and release
  # builds, and several tests assert exact Display output. The matrix above runs
  # the debug profile only, so run the full suites once under --release to keep
  # the build-invariance property continuously verified.
  # ---------------------------------------------------------------------------
  test-release:
    name: Test – release profile
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run core tests (release, full features)
        run: cargo test -p secure-gate --tests --release --features=full -- --skip fixed_alias_zero_size_compile_fail --skip serializable_secret_misuse --skip dynamic_string_no_hex_compile_fail

      - name: Run compat tests (release, all features)
        run: cargo test -p secure-gate-compat --release --all-features

  # ---------------------------------------------------------------------------
  # no_std job — cross-build for a bare-metal target
  #
  # The hosted "--no-default-features" jobs above silently link std, so they
  # cannot catch std leakage (missing #![no_std], dependencies with default
  # `std` features, prelude-only type usage). Cross-building for a target with
  # no std at all is the only authoritative check. `rand` is excluded: it needs
  # a user-configured getrandom backend on bare metal (documented in lib.rs).
  # ---------------------------------------------------------------------------
  no-std:
    name: no_std – cross-build (thumbv7em-none-eabihf)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable + thumbv7em target
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: thumbv7em-none-eabihf

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Cross-build library for bare metal (feature matrix)
        run: |
          set -eux
          for features in \
            "" \
            "encoding-hex" \
            "encoding-base64" \
            "encoding-bech32" \
            "encoding-bech32m" \
            "encoding-hex,encoding-base64,encoding-bech32,encoding-bech32m" \
            "ct-eq" \
            "ct-eq,encoding-hex,encoding-base64,encoding-bech32,encoding-bech32m"
          do
            cargo build -p secure-gate --lib \
              --target thumbv7em-none-eabihf \
              --no-default-features \
              ${features:+--features "$features"}
          done

      - name: Cross-build compat for bare metal
        # secure-gate-compat is unconditionally #![no_std] (alloc-based shims).
        run: |
          set -eux
          cargo build -p secure-gate-compat --lib --target thumbv7em-none-eabihf
          cargo build -p secure-gate-compat --lib --target thumbv7em-none-eabihf --features secrecy-compat

  # ---------------------------------------------------------------------------
  # MSRV job — verify declared rust-version is actually buildable
  #
  # Runs `cargo check` (not full tests) on the MSRV toolchain to catch any
  # accidental use of post-1.85 APIs before they reach a release. This crate
  # uses Rust edition 2024, which requires rustc ≥ 1.85.0. Clippy's
  # --version-lint flag catches MSRV violations in the main `test` job, but
  # a real toolchain check is the authoritative guard.
  # ---------------------------------------------------------------------------
  msrv:
    name: MSRV – cargo check (1.85)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust 1.85
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "1.85"

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Update Cargo.lock with MSRV toolchain
        run: cargo +1.85 update

      - name: cargo check – default features
        run: cargo +1.85 check

      - name: cargo check – full features
        run: cargo +1.85 check --features=full

  # ---------------------------------------------------------------------------
  # AddressSanitizer job — heap zeroization oracle
  #
  # Runs only the `heap_zeroize` integration test binary with ASan + LeakSanitizer
  # enabled. Requires nightly + `-Z build-std` to rebuild std with instrumentation.
  # This job catches heap-use-after-free, buffer overflows, and memory leaks that
  # Miri and the ProxyAllocator approach might miss at the allocator level.
  # ---------------------------------------------------------------------------
  asan-heap:
    name: ASan – heap zeroization
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust nightly + rust-src
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
          components: rust-src

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run heap_zeroize with AddressSanitizer
        env:
          RUSTFLAGS: "-Zsanitizer=address -Zsanitizer=leak -C debuginfo=2"
          ASAN_OPTIONS: "detect_leaks=1:abort_on_error=1:symbolize=1"
        run: >
          cargo +nightly test
          --features alloc
          --test heap_zeroize
          -Z build-std
          --target x86_64-unknown-linux-gnu
