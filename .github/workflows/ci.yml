name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Baseline ──────────────────────────────────────────────────────────
          - name: Default features
            features: ""

          - name: No features
            features: "--no-default-features"

          # ── Alloc / std ──────────────────────────────────────────────────
          - name: alloc explicit
            features: "--no-default-features --features=alloc"

          - name: std explicit
            features: "--no-default-features --features=std"

          # ── Rand ──────────────────────────────────────────────────────────────
          # rand depends on rand/alloc + once_cell/alloc, so alloc is always
          # enabled when rand is enabled.
          - name: rand (includes alloc)
            features: "--no-default-features --features=rand"

          - name: alloc + rand
            features: "--no-default-features --features=alloc,rand"

          # ── Constant-time equality ────────────────────────────────────────────
          # alloc is required so Dynamic-backed tests in ct_eq_suite and
          # proptest_suite/ct_eq.rs (gated on ct-eq + alloc) are exercised.
          - name: ct-eq + alloc
            features: "--no-default-features --features=ct-eq,alloc"

          - name: ct-eq-hash + alloc (BLAKE3 unkeyed)
            features: "--no-default-features --features=ct-eq-hash,alloc"

          - name: ct-eq-hash + alloc + rand (BLAKE3 keyed)
            features: "--no-default-features --features=ct-eq-hash,alloc,rand"

          # ── Encoding ──────────────────────────────────────────────────────────
          - name: encoding (all formats)
            features: "--no-default-features --features=encoding"

          - name: encoding-hex only
            features: "--no-default-features --features=encoding-hex"

          - name: encoding-base64 only
            features: "--no-default-features --features=encoding-base64"

          - name: encoding-bech32 only
            features: "--no-default-features --features=encoding-bech32"

          - name: encoding-bech32m only
            features: "--no-default-features --features=encoding-bech32m"

          - name: encoding-bech32 + bech32m
            features: "--no-default-features --features=encoding-bech32,encoding-bech32m"

          # ── Serde ─────────────────────────────────────────────────────────────
          - name: serde (serialize + deserialize)
            features: "--no-default-features --features=serde"

          - name: serde-serialize only
            features: "--no-default-features --features=serde-serialize"

          - name: serde-deserialize only
            features: "--no-default-features --features=serde-deserialize"

          # ── Cloneable ─────────────────────────────────────────────────────────
          - name: alloc + cloneable
            features: "--no-default-features --features=alloc,cloneable"

          # ── Full ──────────────────────────────────────────────────────────────
          - name: full
            features: "--features=full"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run clippy (${{ matrix.name }})
        run: cargo clippy --tests --benches ${{ matrix.features }}

      - name: Run tests (${{ matrix.name }})
        run: cargo test --tests ${{ matrix.features }}

      - name: Run doctests (${{ matrix.name }})
        run: cargo test --doc ${{ matrix.features }}
