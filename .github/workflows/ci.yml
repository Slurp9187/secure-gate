name: CI

on:
  push:
    branches: [release/0.8]
  pull_request:
    branches: [release/0.8]

permissions:
  contents: read

jobs:
  lint:
    name: Lint (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: no features
            features: "--no-default-features"
          - name: rand (no_std)
            features: "--no-default-features --features=rand"
          - name: full
            features: "--features=full"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Clippy (${{ matrix.name }})
        run: cargo clippy --tests --benches ${{ matrix.features }}

      - name: Doctests (${{ matrix.name }})
        run: cargo test --doc ${{ matrix.features }}

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Baseline ──────────────────────────────────────────────────────────
          - name: Default features
            features: ""

          - name: No features
            features: "--no-default-features"

          # ── Alloc / std ──────────────────────────────────────────────────
          - name: alloc explicit
            features: "--no-default-features --features=alloc"

          - name: std explicit
            features: "--no-default-features --features=std"

          # ── Rand ──────────────────────────────────────────────────────────────
          # rand no longer forces alloc: Fixed::from_random() works without heap.
          # Dynamic::from_random() is covered by the alloc + rand entry below.
          - name: rand (no_std, Fixed only)
            features: "--no-default-features --features=rand"

          - name: alloc + rand
            features: "--no-default-features --features=alloc,rand"

          # ── Constant-time equality ────────────────────────────────────────────
          # alloc is required so Dynamic-backed tests in ct_eq_tests and
          # proptest_suite/ct_eq.rs (gated on ct-eq + alloc) are exercised.
          - name: ct-eq + alloc
            features: "--no-default-features --features=ct-eq,alloc"

          # ── Encoding ──────────────────────────────────────────────────────────
          - name: encoding (all formats)
            features: "--no-default-features --features=encoding"

          - name: encoding-hex only
            features: "--no-default-features --features=encoding-hex"

          - name: encoding-base64 only
            features: "--no-default-features --features=encoding-base64"

          - name: encoding-bech32 only
            features: "--no-default-features --features=encoding-bech32"

          - name: encoding-bech32m only
            features: "--no-default-features --features=encoding-bech32m"

          - name: encoding-bech32 + bech32m
            features: "--no-default-features --features=encoding-bech32,encoding-bech32m"

          # ── Serde ─────────────────────────────────────────────────────────────
          - name: serde (serialize + deserialize)
            features: "--no-default-features --features=serde"

          - name: serde-serialize only
            features: "--no-default-features --features=serde-serialize"

          - name: serde-deserialize only
            features: "--no-default-features --features=serde-deserialize"

          # ── Cloneable ─────────────────────────────────────────────────────────
          - name: alloc + cloneable
            features: "--no-default-features --features=alloc,cloneable"

          # ── Full ──────────────────────────────────────────────────────────────
          - name: full
            features: "--features=full"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run tests (${{ matrix.name }})
        run: cargo test --tests ${{ matrix.features }}

  # ---------------------------------------------------------------------------
  # MSRV job — verify declared rust-version is actually buildable
  #
  # Runs `cargo check` (not full tests) on the MSRV toolchain to catch any
  # accidental use of post-1.70 APIs before they reach a release. Clippy's
  # --version-lint flag catches MSRV violations in the main `test` job, but
  # a real toolchain check is the authoritative guard.
  # ---------------------------------------------------------------------------
  msrv:
    name: MSRV – cargo check (1.70)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust 1.70
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "1.70"

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: cargo check – default features
        run: cargo +1.70 check --locked

      - name: cargo check – full features
        run: cargo +1.70 check --locked --features=full

      - name: cargo test – all features (MSRV compatibility)
        # Skip compile-fail tests: trybuild snapshot format differs between Rust 1.70
        # and stable (diagnostic wording changed). Compile-fail tests verify error
        # message wording, not MSRV compatibility — they run in the stable `test` job.
        run: cargo +1.70 test --locked --all-features -- --skip fixed_alias_zero_size_compile_fail --skip serializable_secret_misuse

  # ---------------------------------------------------------------------------
  # AddressSanitizer job — heap zeroization oracle
  #
  # Runs only the `heap_zeroize` integration test binary with ASan + LeakSanitizer
  # enabled. Requires nightly + `-Z build-std` to rebuild std with instrumentation.
  # This job catches heap-use-after-free, buffer overflows, and memory leaks that
  # Miri and the ProxyAllocator approach might miss at the allocator level.
  # ---------------------------------------------------------------------------
  asan-heap:
    name: ASan – heap zeroization
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust nightly + rust-src
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
          components: rust-src

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run heap_zeroize with AddressSanitizer
        env:
          RUSTFLAGS: "-Zsanitizer=address -Zsanitizer=leak -C debuginfo=2"
          ASAN_OPTIONS: "detect_leaks=1:abort_on_error=1:symbolize=1"
        run: >
          cargo +nightly test
          --features alloc
          --test heap_zeroize
          -Z build-std
          --target x86_64-unknown-linux-gnu
