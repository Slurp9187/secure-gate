# .github/workflows/fuzz-quick.yml
name: Fuzz (quick smoke)

permissions:
  contents: read

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
    paths:
      - "secure-gate-core/fuzz/**"
      - "secure-gate-core/src/**"
      - "secure-gate-core/Cargo.toml"
      - "Cargo.toml"
      - "Cargo.lock"
  pull_request:
    paths:
      - "secure-gate-core/fuzz/**"
      - "secure-gate-core/src/**"
      - "secure-gate-core/Cargo.toml"
      - "Cargo.toml"
      - "Cargo.lock"
  workflow_dispatch: # manual trigger when you need a long run

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        target: [expose, mut, parsing, encoding, serde, ct_eq]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly

      - name: Cache cargo registry + target dir
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Quick smoke test – ${{ matrix.target }} (90 s)
        run: |
          cd secure-gate-core && cargo +nightly fuzz run ${{ matrix.target }} -- \
            -fork=1 \
            -max_total_time=90 \
            -timeout=30

      - name: Upload crash artifacts (only on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crash-${{ matrix.target }}-${{ github.run_id }}
          path: secure-gate-core/fuzz/artifacts/${{ matrix.target }}/**
          retention-days: 7
