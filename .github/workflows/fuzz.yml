name: Fuzz (nightly)

on:
  push:
    branches: [ main ]
  pull_request:
  schedule:
    - cron: '0 3 * * *'   # Run nightly at 03:00 UTC

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 360    # 6 hours max per run

    strategy:
      fail-fast: false
      matrix:
        target:
          - expose
          - clone
          - serde
          - parsing
          - debug
          - mut
          - drop

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust nightly + cargo-fuzz
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
          components: rust-src

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Run fuzzer (${{ matrix.target }}) for 45 minutes
        run: |
          cargo +nightly fuzz run ${{ matrix.target }} \
            -- -max_total_time=2700 -timeout=60

      - name: Upload crash artifacts (if any)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crash-${{ matrix.target }}
          path: fuzz/artifacts/${{ matrix.target }}/