name: Fuzz (nightly)

on:
  push:
    branches: [ main ]
  pull_request:
  schedule:
    - cron: '0 3 * * *'   # Run nightly at 03:00 UTC

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 360    # 6 hours max total for the whole job

    strategy:
      fail-fast: false
      matrix:
        target:
          - expose
          - clone
          - serde
          - parsing
          - debug
          - mut
          - drop

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust nightly + cargo-fuzz
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Run fuzzer (${{ matrix.target }}) for 60 minutes
        run: |
          cargo +nightly fuzz run ${{ matrix.target }} \
            -- -max_total_time=3600 -timeout=60 -rss_limit_mb=4096