name: DSE zeroization check

# The DSE asm-grep test in tests/asm_dse_check.rs is gated to
# x86_64 (cfg(target_arch = "x86_64")). It checks both AT&T
# (ubuntu-latest) and Intel (windows-latest, MSVC) syntax.
# ARM64 macOS runners (macos-latest) silently skip the test
# and are therefore not in the matrix; if x86_64 macOS coverage
# is needed, switch to macos-13.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1' # weekly, Monday 03:00 UTC
  push:
    branches: [release/0.8]
  pull_request:
    branches: [release/0.8]

permissions:
  contents: read

jobs:
  dse-check:
    name: DSE - volatile zero-store survival (${{ matrix.os }}, ${{ matrix.toolchain }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        toolchain: [stable, nightly]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust ${{ matrix.toolchain }}
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ matrix.toolchain }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run DSE check (${{ matrix.toolchain }})
        run: >
          cargo +${{ matrix.toolchain }} test
          -p secure-gate
          --release
          --test asm_dse_check
          -- --ignored --nocapture
