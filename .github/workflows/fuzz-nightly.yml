name: Fuzz (nightly)

on:
  schedule:
    - cron: "0 10 * * *" # 3:00 AM MST (Arizona Time) = 10:00 UTC
  workflow_dispatch: # manual trigger when you need a long run

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 120 # 2 hours total is plenty

    strategy:
      fail-fast: false
      matrix:
        target: [clone, expose, mut, parsing, serde] # Inline for brevity

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      # Only run full 60-minute fuzz on tagged releases and nightly schedule
      - name: Run full fuzzer (${{ matrix.target }}) for 60 minutes
        if: github.event_name == 'schedule'
        run: |
          cargo +nightly fuzz cmin ${{ matrix.target }}  # Prune stale corpus (optional, <10s)
          cargo +nightly fuzz run ${{ matrix.target }} -- \
            -fork=1 -max_total_time=3600 \
               -timeout=60 \
               -rss_limit_mb=4096

      # On normal main pushes: only 90-second smoke test
      - name: Quick smoke fuzz (90s) — catches obvious crashes
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.ref_type == 'branch'
        run: |
          cargo +nightly fuzz run ${{ matrix.target }} -- \
            -fork=1 -max_total_time=90

      - name: Upload artifacts (only on failure or full run)
        if: failure() || github.ref_type == 'tag' || github.event_name == 'schedule'
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts-${{ matrix.target }}
          path: fuzz/artifacts/${{ matrix.target }}/**
          retention-days: 30
