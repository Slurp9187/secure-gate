name: Fuzz (nightly – compat)

on:
  schedule:
    - cron: "0 4 * * *" # 04:00 UTC daily
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "secure-gate-compat/fuzz/**"
      - "secure-gate-compat/src/**"
      - "secure-gate-compat/Cargo.toml"
  pull_request:
    paths:
      - "secure-gate-compat/fuzz/**"
      - "secure-gate-compat/src/**"
      - "secure-gate-compat/Cargo.toml"

permissions:
  contents: read

jobs:
  fuzz:
    name: ${{ matrix.target }} (${{ matrix.mode }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        target: [compat_v08, compat_v10]
        mode: [normal, asan]

    env:
      FUZZER_ARGS: >-
        -fork=1
        -timeout=30
        -rss_limit_mb=4096
        -runs=0
        -max_total_time=3000
        -max_len=4096
        -use_value_profile=1
        -detect_leaks=0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust nightly + rust-src
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
          components: rust-src

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "secure-gate-compat/fuzz"

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Fuzz – ${{ matrix.target }} (${{ matrix.mode }})
        env:
          RUSTFLAGS: ${{ matrix.mode == 'asan' && '-Zsanitizer=address -Zsanitizer=leak -C debuginfo=2' || '' }}
          ASAN_OPTIONS: "detect_leaks=1:abort_on_error=1:symbolize=1:allocator_may_return_null=1"
        run: |
          echo "Fuzzing ${{ matrix.target }} (${{ matrix.mode }})..."
          cargo +nightly fuzz run ${{ matrix.target }} \
            --manifest-path secure-gate-compat/fuzz/Cargo.toml \
            -- \
            ${{ env.FUZZER_ARGS }}

      - name: Upload crash artifacts (if any)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crash-nightly-${{ matrix.target }}-${{ matrix.mode }}-${{ github.run_id }}
          path: secure-gate-compat/fuzz/artifacts/${{ matrix.target }}/**
          retention-days: 14

      - name: Upload corpus (best effort)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-corpus-nightly-${{ matrix.target }}-${{ matrix.mode }}-${{ github.run_id }}
          path: secure-gate-compat/fuzz/corpus/${{ matrix.target }}/
          retention-days: 30
          if-no-files-found: warn
