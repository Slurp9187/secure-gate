name: Fuzz (quick smoke)

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - "secure-gate-compat/**"
  pull_request:
    paths:
      - "secure-gate-compat/**"
  workflow_dispatch:

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        target: [compat_v08, compat_v10]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly

      - name: Cache cargo registry + target dir
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "secure-gate-compat/fuzz"

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Quick smoke test – ${{ matrix.target }} (90 s)
        run: |
          cargo +nightly fuzz run ${{ matrix.target }} \
            --manifest-path secure-gate-compat/fuzz/Cargo.toml -- \
            -fork=1 \
            -max_total_time=90 \
            -timeout=30

      - name: Upload crash artifacts (only on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crash-${{ matrix.target }}-${{ github.run_id }}
          path: secure-gate-compat/fuzz/artifacts/${{ matrix.target }}/**
          retention-days: 7
