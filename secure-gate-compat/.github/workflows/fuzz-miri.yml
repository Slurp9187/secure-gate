name: Fuzz (Miri UB checks)

on:
  push:
    branches: [main]
    paths:
      - "secure-gate-compat/**"
  pull_request:
    branches: [main]
    paths:
      - "secure-gate-compat/**"
  schedule:
    - cron: "0 3 * * 0" # Every Sunday at 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  miri:
    name: Miri (UB + fuzz corpus)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust nightly + Miri
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
          components: miri
          cache: true

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "secure-gate-compat/fuzz"

      - name: Setup Miri
        run: cargo miri setup

      - name: Miri on compat tests (strict)
        env:
          MIRIFLAGS: "-Zmiri-ignore-leaks -Zmiri-disable-isolation -Zmiri-strict-provenance"
        run: cargo +nightly miri test -p secure-gate-compat --all-features

      - name: Light Miri corpus scan on fuzz targets (weekly/manual only)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          MIRIFLAGS: "-Zmiri-ignore-leaks -Zmiri-disable-isolation -Zmiri-strict-provenance"
        run: |
          echo "Running Miri on compat fuzz targets (timeout 90s each)..."
          for target in compat_v08 compat_v10; do
            echo "=== Miri fuzz target: $target ==="
            timeout 90 cargo +nightly miri run \
              --manifest-path secure-gate-compat/fuzz/Cargo.toml \
              --bin $target -- -max_total_time=45 || \
              echo "Warning: $target timed out (expected for long-running fuzz)"
          done
        continue-on-error: true

      - name: Upload Miri logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: miri-logs-${{ github.run_id }}
          path: |
            ~/.miri/**
            target/miri/**
            secure-gate-compat/fuzz/artifacts/**
          retention-days: 14
