name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: No features
            features: "--no-default-features"
          - name: secrecy-compat
            features: "--features=secrecy-compat"
          - name: dual-compat-test
            features: "--features=dual-compat-test"
          - name: Full
            features: "--features=full"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Clippy (${{ matrix.name }})
        run: cargo clippy -p secure-gate-compat --tests ${{ matrix.features }} -- -D warnings

      - name: Doctests (${{ matrix.name }})
        run: cargo test -p secure-gate-compat --doc ${{ matrix.features }}

  test:
    name: Test (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Default features
            features: ""
          - name: No features
            features: "--no-default-features"
          - name: secrecy-compat
            features: "--features=secrecy-compat"
          - name: dual-compat-test
            features: "--features=dual-compat-test"
          - name: full
            features: "--features=full"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run tests (${{ matrix.name }})
        run: cargo test -p secure-gate-compat --tests ${{ matrix.features }}

  msrv:
    name: MSRV – cargo check (1.85)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust 1.85
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "1.85"

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Update Cargo.lock with MSRV toolchain
        run: cargo +1.85 update -p secure-gate-compat

      - name: cargo check – default
        run: cargo +1.85 check -p secure-gate-compat

      - name: cargo check – secrecy-compat
        run: cargo +1.85 check -p secure-gate-compat --features=secrecy-compat

      - name: cargo check – full
        run: cargo +1.85 check -p secure-gate-compat --features=full
