description = "Compatibility layers for migrating from the secrecy crate (v0.8 and v0.10)"
license.workspace = true
repository.workspace = true

[dependencies]
secure-gate = { path = "../secure-gate-core", features = ["secrecy-compat"] }

[[bin]]
