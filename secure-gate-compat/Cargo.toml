[package]
name = "secure-gate-compat"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "Compatibility layers for migrating from the secrecy crate (v0.8 and v0.10)"
license.workspace = true
repository.workspace = true

[dependencies]
secure-gate = { path = "../secure-gate-core" }

[dev-dependencies]
# Dual-parity testing baselines — pinned exact versions matching local source clones.
# These compile as dev-deps always; the dual-compat-test feature gates the test module.
secrecy-v08 = { package = "secrecy", version = "=0.8.0" }
secrecy-v10 = { package = "secrecy", version = "=0.10.1" }

# secrecy compatibility shims — drop-in replacements for secrecy v0.8.0 and v0.10.1.
# Enables `secure_gate::compat::v10` (SecretBox/SecretString/SecretSlice) and
# `secure_gate::compat::v08` (Secret/SecretString/SecretVec/DebugSecret).
# Shared traits (ExposeSecret, CloneableSecret, zeroize re-export) live in compat root.
# See `src/compat/` for the full migration guides and
# `tests/compat_suite/` for the exhaustive migration test suite.
secrecy-compat = ["alloc"]

# Enables side-by-side parity tests in tests/compat_dual/ that run the exact same
# test body against both the real `secrecy` crate and the compat shim, proving drop-in
# identity. Implies secrecy-compat. Real secrecy dev-deps are always compiled (they are
# ordinary dev-dependencies); this feature just activates the test module.
dual-compat-test = ["secrecy-compat"]

[[test]]
name = "migration_full"
path = "tests/migration_full.rs"
harness = false

[[bin]]
name = "compat_v08"
path = "fuzz_targets/compat_v08.rs"
test = false
bench = false
doc = false

[[bin]]
name = "compat_v10"
path = "fuzz_targets/compat_v10.rs"
test = false
bench = false
doc = false
